name: Netlify Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: netlify-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ !github.event.pull_request.draft && !github.event.pull_request.head.repo.fork && secrets.NETLIFY_AUTH_TOKEN != '' && secrets.NETLIFY_SITE_ID != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Quick syntax guard before deploy
        run: |
          set -euo pipefail
          node --check netlify/functions/api.js
          node --check public/script.js
          node --check public/chat.js
          node --check public/firebase-client.js

      - name: Deploy to Netlify Preview
        id: deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          set -euo pipefail
          npx netlify-cli@latest deploy \
            --dir=public \
            --functions=netlify/functions \
            --message="PR #${{ github.event.pull_request.number }} - ${{ github.sha }}" \
            --site="$NETLIFY_SITE_ID" \
            --auth="$NETLIFY_AUTH_TOKEN" \
            --json > netlify-preview.json 2> netlify-preview.err.log

          PREVIEW_URL=$(node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('netlify-preview.json','utf8'));console.log(j.deploy_url || j.url || '');")
          if [ -z "$PREVIEW_URL" ]; then
            echo "Unable to resolve preview URL from Netlify output"
            cat netlify-preview.json
            exit 1
          fi

          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        with:
          script: |
            const marker = '<!-- netlify-preview-comment -->';
            const body = `${marker}\n✅ Netlify Preview is ready:\n\n${process.env.PREVIEW_URL}`;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(c => c.user.type === 'Bot' && c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Upload preview deploy artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: netlify-preview-debug-${{ github.run_id }}
          retention-days: 7
          if-no-files-found: ignore
          path: |
            netlify-preview.json
            netlify-preview.err.log
