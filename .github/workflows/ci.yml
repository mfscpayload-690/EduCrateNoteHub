name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - gh-pages

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Code, Config, and Security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run syntax checks
        run: |
          set -euo pipefail
          node --check server.js
          node --check netlify/functions/api.js
          node --check netlify/functions/lib/firebaseAdmin.js
          node --check netlify/functions/lib/openrouter.js
          node --check netlify/functions/lib/chatStore.js
          node --check netlify/functions/lib/pdfContext.js
          node --check public/script.js
          node --check public/chat.js
          node --check public/firebase-client.js
          node --check security-test.js
          node --check test-drive.js

      - name: Validate workflow/config JSON
        run: |
          set -euo pipefail
          node -e "JSON.parse(require('fs').readFileSync('firebase.json', 'utf8')); console.log('firebase.json valid')"
          node -e "JSON.parse(require('fs').readFileSync('firestore.indexes.json', 'utf8')); console.log('firestore.indexes.json valid')"
          node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8')); console.log('package.json valid')"

      - name: Run security test suite
        run: node security-test.js

      - name: Run npm audit (high+)
        run: npm audit --omit=dev --audit-level=high

      - name: Upload CI logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-debug-${{ github.run_id }}
          retention-days: 7
          if-no-files-found: ignore
          path: |
            npm-debug.log*
            **/*.log
