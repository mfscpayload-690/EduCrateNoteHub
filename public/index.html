<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>EduCrate |S4 CS2 Notes</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png">
    <link rel="icon" href="/favicon_io/favicon.ico" sizes="any">
    <link rel="manifest" href="/favicon_io/site.webmanifest">
    <meta name="theme-color" content="#ffffff">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4F46E5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81' } } } }
        }
    </script>
    <style>
        .shimmer { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shim 1.5s infinite; }
        @keyframes shim { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .dark .shimmer { background: linear-gradient(90deg, #131b4a 25%, #1a2560 50%, #131b4a 75%); }
        body.modal-open { overflow: hidden; }
        /* Smooth scrolling for touch devices */
        * { -webkit-tap-highlight-color: transparent; }
        /* PDF Viewer Styles - Mobile Optimized */
        #pdfIframe { border: none; width: 100%; height: 100%; background: white; }
        /* Pull-to-refresh indicator */
        #pullRefreshIndicator { position: fixed; top: 64px; left: 50%; transform: translateX(-50%) translateY(-60px); z-index: 55; transition: transform 0.2s ease, opacity 0.2s ease; opacity: 0; pointer-events: none; }
        #pullRefreshIndicator.visible { opacity: 1; }
        #pullRefreshIndicator.refreshing svg { animation: spin 0.8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        :root {
            --bg-0: #f6f8ff;
            --bg-1: #eef2ff;
            --bg-2: #e6ebff;
            --acc-1: #7b5cff;
            --acc-2: #4fd1ff;
            --acc-3: #ff5da2;
            --panel: rgba(255, 255, 255, 0.72);
            --panel-border: rgba(99, 102, 241, 0.18);
            --text-main: #000000;
            --text-muted: #000000;
            --control-bg: rgba(255, 255, 255, 0.78);
            --control-text: #000000;
            --control-border: rgba(99, 102, 241, 0.2);
            --overlay: rgba(30, 41, 59, 0.45);
        }

        .dark {
            --bg-0: #07091f;
            --bg-1: #0b1030;
            --bg-2: #151c4a;
            --panel: rgba(10, 14, 44, 0.7);
            --panel-border: rgba(140, 160, 255, 0.22);
            --text-main: #e8eeff;
            --text-muted: #9aa7d6;
            --control-bg: rgba(22, 30, 77, 0.55);
            --control-text: #c9d4ff;
            --control-border: rgba(143, 162, 255, 0.2);
            --overlay: rgba(4, 7, 24, 0.72);
        }

        body {
            color: var(--text-main);
            background:
                radial-gradient(1100px 640px at 15% 0%, rgba(123, 92, 255, 0.26), transparent 60%),
                radial-gradient(900px 560px at 85% 20%, rgba(79, 209, 255, 0.18), transparent 60%),
                linear-gradient(145deg, var(--bg-0), var(--bg-1) 45%, var(--bg-2));
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: -20%;
            z-index: -2;
            background:
                radial-gradient(circle at 30% 30%, rgba(123, 92, 255, 0.22), transparent 35%),
                radial-gradient(circle at 70% 60%, rgba(79, 209, 255, 0.18), transparent 35%),
                radial-gradient(circle at 50% 80%, rgba(255, 93, 162, 0.1), transparent 30%);
            filter: blur(30px);
            animation: bgDrift 16s ease-in-out infinite alternate;
            pointer-events: none;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            opacity: 0.16;
            background-image:
                repeating-radial-gradient(circle at 0 0, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.08) 1px, transparent 1px, transparent 7px),
                repeating-linear-gradient(45deg, rgba(123, 92, 255, 0.06) 0 2px, rgba(79, 209, 255, 0.04) 2px 4px, transparent 4px 8px);
            mix-blend-mode: soft-light;
            animation: textureShift 18s linear infinite;
        }

        @keyframes bgDrift {
            0% { transform: translate3d(-2%, -1%, 0) scale(1); }
            100% { transform: translate3d(2%, 1%, 0) scale(1.06); }
        }

        @keyframes textureShift {
            from { transform: translate3d(0, 0, 0); }
            to { transform: translate3d(-40px, -20px, 0); }
        }

        @keyframes sidebarColorFloat {
            0% { transform: translate3d(-2%, -1%, 0) scale(1); }
            100% { transform: translate3d(2%, 1%, 0) scale(1.08); }
        }

        @keyframes sidebarTextureDrift {
            from { transform: translate3d(0, 0, 0); }
            to { transform: translate3d(-30px, -14px, 0); }
        }

        nav,
        #sidebar,
        #contentHeader,
        #searchResults,
        #pullRefreshIndicator,
        #pdfModal .relative.flex.flex-col.h-full.w-full.overflow-hidden,
        #pdfModal .flex.items-center.justify-between,
        #pdfContainer {
            background: var(--panel) !important;
            backdrop-filter: blur(16px);
            border-color: var(--panel-border) !important;
        }

        #sidebarOverlay,
        #modalBackdrop {
            background-color: var(--overlay) !important;
        }

        #sidebar {
            background: transparent !important;
            overflow: hidden;
            isolation: isolate;
        }

        #sidebar::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.42;
            background:
                radial-gradient(circle at 25% 22%, rgba(123, 92, 255, 0.3), transparent 48%),
                radial-gradient(circle at 78% 72%, rgba(79, 209, 255, 0.24), transparent 46%),
                radial-gradient(circle at 52% 86%, rgba(255, 93, 162, 0.13), transparent 36%);
            filter: blur(14px);
            animation: sidebarColorFloat 12s ease-in-out infinite alternate;
        }

        #sidebar::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.2;
            background-image:
                repeating-radial-gradient(circle at 0 0, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.08) 1px, transparent 1px, transparent 7px),
                repeating-linear-gradient(45deg, rgba(123, 92, 255, 0.07) 0 2px, rgba(79, 209, 255, 0.05) 2px 4px, transparent 4px 8px);
            mix-blend-mode: soft-light;
            animation: sidebarTextureDrift 18s linear infinite;
        }

        #sidebar > * {
            position: relative;
            z-index: 1;
        }

        #welcomeState p,
        #pullRefreshText,
        #emptyState,
        .text-slate-500,
        .dark .text-slate-400,
        .dark .text-slate-500 {
            color: var(--text-muted) !important;
        }

        #browseSubjectsBtn,
        #pdfDownload {
            background-image: linear-gradient(90deg, var(--acc-1), var(--acc-3));
            box-shadow: 0 10px 28px rgba(123, 92, 255, 0.35);
            border: none;
        }

        #browseSubjectsBtn:hover,
        #pdfDownload:hover {
            filter: brightness(1.07);
        }

        #searchInput,
        #closeSearchBtn,
        #mobileSearchTrigger,
        #themeToggle,
        #closePdfBtn,
        #menuBtn {
            background-color: var(--control-bg) !important;
            color: var(--control-text) !important;
            border: 1px solid var(--control-border);
        }

        #searchInput::placeholder {
            color: rgba(171, 184, 230, 0.72);
        }

        #contentTitle,
        #pdfTitle,
        #welcomeState h2,
        .dark .dark\:text-white {
            color: var(--text-main) !important;
        }

        html:not(.dark) .text-slate-400,
        html:not(.dark) .text-slate-500,
        html:not(.dark) .text-slate-600,
        html:not(.dark) .text-slate-700 {
            color: #000000 !important;
        }

        html:not(.dark) #searchInput::placeholder {
            color: rgba(0, 0, 0, 0.65);
        }

        @media (prefers-reduced-motion: reduce) {
            html { scroll-behavior: auto !important; }
            .shimmer,
            #pullRefreshIndicator.refreshing svg,
            body::before,
            body::after,
            #sidebar::before,
            #sidebar::after {
                animation: none !important;
            }
        }
    </style>
</head>
<body class="min-h-screen font-sans selection:bg-primary-100 dark:selection:bg-primary-900">
    
    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 z-[60]">
    <div class="flex items-center justify-between px-4 h-16 max-w-7xl mx-auto">
        
        <!-- Left Section: Menu & Logo -->
        <div id="logoContainer" class="flex items-center gap-3 transition-all duration-300">
            <button id="menuBtn" aria-label="Open sidebar" class="md:hidden p-2 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <a href="/" class="flex items-center">
                <span class="text-xl font-extrabold text-primary-600 dark:text-primary-400 tracking-tight">EduCrate</span>
            </a>
        </div>

        <!-- Center Section: Search Bar -->
        <div id="searchWrapper" class="flex-1 flex justify-end md:justify-center items-center px-2 transition-all duration-300">
            <!-- Mobile Back Button (Hidden by default) -->
            <button id="closeSearchBtn" aria-label="Close search" class="hidden p-2 text-slate-500 mr-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>

            <div class="relative w-full max-w-md">
                <!-- Actual Search Input -->
                <div id="searchBarContainer" class="hidden md:block relative w-full">
                    <input type="text" id="searchInput" aria-label="Search notes" aria-autocomplete="list" aria-expanded="false" aria-controls="searchResults" placeholder="Search notes..." class="w-full pl-4 pr-10 py-2 bg-slate-100 dark:bg-slate-800 border-transparent rounded-xl text-sm focus:ring-2 focus:ring-primary-500 dark:text-white outline-none transition-all">
                    <div id="searchResults" role="listbox" aria-label="Search results" class="absolute top-full left-0 right-0 mt-2 bg-white dark:bg-slate-800 rounded-2xl shadow-2xl hidden z-[100] border border-slate-200 dark:border-slate-700 max-h-[70vh] overflow-y-auto"></div>
                </div>
            </div>
        </div>

        <!-- Right Section: Theme Toggle -->
        <div id="rightNav" class="flex items-center gap-1 transition-all duration-300">
            <!-- Mobile Search Trigger Icon -->
            <button id="mobileSearchTrigger" aria-label="Open search" class="md:hidden p-2.5 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </button>
            <button id="themeToggle" aria-label="Toggle theme" class="p-2.5 rounded-xl text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                <svg id="sunIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                <svg id="moonIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
            </button>
        </div>
    </div>
</nav>
    
    <!-- Sidebar -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-30 hidden"></div>
    <aside id="sidebar" class="fixed left-0 top-16 bottom-0 w-64 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 z-30 -translate-x-full md:translate-x-0 transition-transform duration-300">
        <div class="p-4 flex flex-col h-full">
            <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-4 px-2">Subjects</h2>
            <div id="foldersList" class="space-y-1 flex-1 overflow-y-auto">
                <div class="p-2 space-y-3"><div class="h-9 shimmer rounded-lg"></div><div class="h-9 shimmer rounded-lg"></div></div>
            </div>
            <div class="pt-4 border-t border-slate-100 dark:border-slate-800">
                <p class="text-[10px] text-slate-400 text-center mb-1">CRAFTED FOR S4 CS2</p>
                <a href="https://github.com/MabelMoncy" target="_blank" rel="noopener noreferrer" class="block text-xs font-bold text-primary-600 dark:text-primary-400 text-center hover:underline cursor-pointer">
                    Mabel Anto Moncy
                </a>
            </div>
        </div>
    </aside>
    
    <!-- Main Content -->
    <main class="md:ml-64 pt-16 min-h-screen">
        <div id="contentHeader" class="hidden p-6 md:p-8 bg-white dark:bg-slate-950 border-b border-slate-100 dark:border-slate-800">
            <h1 id="contentTitle" class="text-2xl font-black dark:text-white tracking-tight">Subject</h1>
        </div>
        
        <div class="p-6 md:p-8">
            <div id="welcomeState" class="flex flex-col items-center justify-center py-24 text-center">
                <div class="w-20 h-20 rounded-[2rem] flex items-center justify-center mb-8 overflow-hidden">
                    <img src="/logo.png" alt="EduCrate" width="80" height="80" class="w-full h-full object-cover" loading="lazy" decoding="async">
                </div>
                <h2 class="text-3xl font-extrabold dark:text-white mb-3">Welcome to EduCrate</h2>
                <p class="text-slate-500 max-w-sm mx-auto leading-relaxed mb-6">The dedicated digital library for S4 Computer Science & Engineering Students.</p>
                <button id="browseSubjectsBtn" class="inline-flex items-center gap-2 px-6 py-3 bg-primary-600 text-white rounded-xl font-bold hover:bg-primary-700 hover:scale-105 transition-all shadow-lg shadow-primary-500/30 active:scale-95">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
                    Browse Subjects
                </button>
            </div>
            
            <div id="filesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
            <div id="emptyState" class="hidden text-center py-20 text-slate-400 font-medium">No notes uploaded to this section yet.</div>
        </div>
    </main>
    
    <!-- PDF VIEWER MODAL - Mobile Optimized with Google Drive Preview -->
    <div id="pdfModal" class="fixed inset-0 z-[100] hidden flex flex-col">
        <div class="absolute inset-0 bg-slate-950/95 backdrop-blur-sm" id="modalBackdrop"></div>
        <div class="relative flex flex-col h-full w-full overflow-hidden">
            <!-- Modal Header -->
            <div class="flex items-center justify-between px-3 sm:px-4 py-2 sm:py-3 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 z-50">
                <div class="flex items-center gap-2 sm:gap-3 min-w-0 flex-1">
                    <div class="bg-red-500 p-1 sm:p-1.5 rounded shadow-lg shadow-red-500/20 flex-shrink-0">
                        <svg class="w-3 h-3 sm:w-4 sm:h-4 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z"/></svg>
                    </div>
                    <h3 id="pdfTitle" class="font-bold dark:text-white truncate text-xs sm:text-sm">Document.pdf</h3>
                </div>
                <div class="flex items-center gap-1 sm:gap-2">
                    <a id="pdfDownload" href="#" class="flex items-center gap-1 sm:gap-2 px-2 sm:px-4 py-1.5 sm:py-2 bg-primary-600 text-white rounded-lg sm:rounded-xl text-xs font-bold hover:bg-primary-700 transition-all">
                        <svg class="w-3 h-3 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                        <span>DOWNLOAD</span>
                    </a>
                    <button id="closePdfBtn" aria-label="Close PDF viewer" class="p-1.5 sm:p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg sm:rounded-xl transition-colors">
                        <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
            </div>

            <!-- PDF Iframe Container -->
            <div id="pdfContainer" class="flex-1 overflow-hidden bg-slate-200 dark:bg-slate-950">
                <!-- Loading State -->
                <div id="pdfLoading" class="flex flex-col items-center justify-center h-full">
                    <div class="w-10 h-10 sm:w-12 sm:h-12 border-[3px] border-primary-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p class="text-slate-400 text-xs font-bold tracking-widest uppercase">Loading PDF...</p>
                </div>
                <!-- Google Drive Preview Iframe -->
                <iframe id="pdfIframe" class="hidden w-full h-full" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <!-- Pull-to-refresh indicator -->
    <div id="pullRefreshIndicator" class="flex items-center gap-2 px-4 py-2 bg-white dark:bg-slate-800 rounded-full shadow-lg border border-slate-200 dark:border-slate-700">
        <svg class="w-4 h-4 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        <span id="pullRefreshText" class="text-xs font-bold text-slate-500 dark:text-slate-400">Pull to refresh</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
